name: CD — Release to Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # Matches v1.0.0, v2.3.14, etc.
      # Does NOT match: v1.0.0-beta, latest, test-tag

jobs:
  # ── Job 1: Run the full test suite against the tagged commit ─────────────
  test:
    name: Verify tag commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npm test

  # ── Job 2: Build, tag, and push production image ─────────────────────────
  release:
    name: Build & Push Release Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/cicd-exercise
    outputs:
      # Pass the resolved image tags to the deploy job
      image_tags: ${{ steps.meta.outputs.tags }}
      version: ${{ github.ref_name }}    # e.g. "v1.2.3"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Semantic version tags: v1.2.3, v1.2, v1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Create a GitHub Release with auto-generated changelog
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true   # Auto-generates changelog from commits
          body: |
            ## Docker Images
            ```
            docker pull ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

  # ── Job 3: Deploy to production (requires manual approval) ───────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: release
    environment: production              # ← Manual approval gate lives here
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/cicd-exercise

    steps:
      - name: Deploy to production
        run: |
          echo "🎯 Deploying PRODUCTION release"
          echo "   Version    : ${{ needs.release.outputs.version }}"
          echo "   Image      : ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}"
          echo "   Target URL : ${{ secrets.DEPLOY_URL }}"
          echo "   Environment: ${{ secrets.APP_ENV }}"
          echo "✅ Production deployment complete"

      - name: Write production summary
        run: |
          echo "## 🎯 Production Release ${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.release.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | production |" >> $GITHUB_STEP_SUMMARY