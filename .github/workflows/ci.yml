name: CI — Lint, Test & Build

on:
  push:
    branches: ["**"]          # every branch push
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Job 2: Test ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint                # Only test if lint passes
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4    # ← This creates a downloadable artifact
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7                 # Auto-deletes after 7 days

  # ── Job 3: Build Docker image ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test                # Only build if tests pass
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on CI)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false                       # Build only — push happens in CD
          tags: cicd-exercise:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max