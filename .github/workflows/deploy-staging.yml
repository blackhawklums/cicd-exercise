name: CD — Deploy to Staging

on:
  push:
    branches: [main]           # Only runs on main, not feature branches

jobs:
  deploy-staging:
    name: Build, Push & Deploy (Staging)
    runs-on: ubuntu-latest
    environment: staging       # ← Binds to the "staging" GitHub Environment
    # These env vars come from the workflow-level + environment secrets
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/cicd-exercise

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in using the DockerHub secrets you configured in Part 2
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Extract metadata for smart tagging
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-           # e.g. sha-a1b2c3d
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            APP_ENV=${{ secrets.APP_ENV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Simulate deployment — in a real pipeline this would SSH into a server,
      # trigger a Kubernetes rollout, or call a cloud provider API.
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying image ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          echo "   Target URL : ${{ secrets.DEPLOY_URL }}"
          echo "   Environment: ${{ secrets.APP_ENV }}"
          echo "   Triggered by: ${{ github.actor }}"
          echo "✅ Staging deployment complete"

      # Post a deployment summary to the GitHub Actions summary page
      - name: Write deployment summary
        run: |
          echo "## 🚀 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | staging |" >> $GITHUB_STEP_SUMMARY